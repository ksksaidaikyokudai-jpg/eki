<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>eki. — Station Navigator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #b5ff47;
      --bg:          #0a0a0a;
      --surface:     #1a1a1a;
      --surface2:    #272727;
      --text:        #ffffff;
      --muted:       #888888;
      --danger:      #ff4757;
      --success:     #2ed573;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--accent);
      line-height: 1;
    }
    .logo sup {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.5px;
      color: var(--muted);
      vertical-align: super;
      margin-left: 2px;
    }

    #settings-btn {
      background: var(--surface);
      border: none;
      color: var(--text);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Camera area ── */
    #camera-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #camera-placeholder {
      display: flex;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px 24px;
    }
    #camera-placeholder .ph-icon {
      font-size: 64px;
      opacity: 0.5;
    }
    #cam-err-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }
    #cam-err-detail {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      padding: 0 16px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 300px;
    }
    #start-camera-btn {
      margin-top: 4px;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: -0.3px;
    }
    #start-camera-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Viewfinder corners ── */
    .vf { position: absolute; inset: 0; pointer-events: none; }
    .vf-c {
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.75;
    }
    .vf-c.tl { top: 18px; left: 18px; border-width: 3px 0 0 3px; }
    .vf-c.tr { top: 18px; right: 18px; border-width: 3px 3px 0 0; }
    .vf-c.bl { bottom: 90px; left: 18px; border-width: 0 0 3px 3px; }
    .vf-c.br { bottom: 90px; right: 18px; border-width: 0 3px 3px 0; }

    /* ── Analyzing overlay ── */
    #analyzing {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 15;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-size: 18px;
    }
    #analyzing.on { display: flex; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Capture bar ── */
    #capture-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(transparent, rgba(0,0,0,0.88));
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      z-index: 5;
    }

    #upload-btn {
      background: var(--surface);
      border: 2px solid rgba(255,255,255,0.2);
      color: var(--text);
      width: 52px; height: 52px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #upload-btn:active { transform: scale(0.91); }

    /* アップロード後のプレビュー */
    #preview-img {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    #capture-btn {
      width: 78px; height: 78px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      background: transparent;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }
    #capture-btn:active { transform: scale(0.91); }
    #capture-btn::after {
      content: '';
      width: 58px; height: 58px;
      border-radius: 50%;
      background: #ffffff;
      transition: background 0.2s, opacity 0.2s;
    }
    #capture-btn.loading::after {
      background: var(--muted);
      animation: pulse 1s ease-in-out infinite;
    }
    #capture-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ── Results panel ── */
    #results-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      padding: 14px 20px 36px;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(.25,.46,.45,.94);
      max-height: 76vh;
      overflow-y: auto;
      z-index: 20;
      -webkit-overflow-scrolling: touch;
    }
    #results-panel.open { transform: translateY(0); }

    .panel-handle {
      width: 38px; height: 4px;
      background: var(--muted);
      border-radius: 2px;
      margin: 0 auto 18px;
      opacity: 0.35;
    }

    #close-btn {
      position: absolute;
      top: 14px; right: 18px;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Result content ── */
    .station-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .conf-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .conf-dot.high   { background: var(--success); }
    .conf-dot.medium { background: #ffa502; }
    .conf-dot.low    { background: var(--danger); }

    .station-name {
      font-size: 14px;
      color: var(--muted);
    }
    .station-ja {
      font-size: 13px;
      color: var(--muted);
      opacity: 0.65;
    }

    .area-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 18px;
    }

    .exit-card {
      background: var(--accent);
      color: #000;
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 20px;
    }
    .exit-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.65;
      margin-bottom: 4px;
    }
    .exit-name {
      font-size: 22px;
      font-weight: 800;
    }

    .landmarks {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .steps-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 11px 0;
      border-bottom: 1px solid var(--surface2);
    }
    .step:last-child { border-bottom: none; }
    .step-icon { font-size: 22px; width: 34px; text-align: center; flex-shrink: 0; }
    .step-text { font-size: 17px; line-height: 1.4; padding-top: 1px; }

    .notes {
      margin-top: 14px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.55;
    }

    .err {
      color: var(--danger);
      font-size: 17px;
      text-align: center;
      padding: 24px 0;
      line-height: 1.65;
    }

    /* ── Settings sheet ── */
    #settings-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 100;
      align-items: flex-end;
      padding: 16px;
    }
    #settings-modal.open { display: flex; }

    .sheet {
      background: var(--surface);
      border-radius: 22px;
      padding: 24px 22px 28px;
      width: 100%;
    }
    .sheet-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .field-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    #api-key-input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid rgba(255,255,255,0.08);
      color: var(--text);
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      -webkit-appearance: none;
    }
    #api-key-input:focus { border-color: var(--accent); }

    .btn-save {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .sheet-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">eki<sup>. BETA</sup></div>
    <button id="settings-btn" aria-label="Settings">⚙️</button>
  </header>

  <div id="camera-wrap">
    <video id="video" autoplay playsinline webkit-playsinline muted style="display:none"></video>
    <img id="preview-img" alt="Uploaded photo">

    <div id="camera-placeholder">
      <div class="ph-icon">📷</div>
      <p id="cam-err-title">Tap to start camera</p>
      <small id="cam-err-detail">Allow camera access when prompted</small>
      <button id="start-camera-btn">Start Camera</button>
    </div>

    <!-- Viewfinder corners -->
    <div class="vf" aria-hidden="true">
      <div class="vf-c tl"></div>
      <div class="vf-c tr"></div>
      <div class="vf-c bl"></div>
      <div class="vf-c br"></div>
    </div>

    <!-- Analyzing overlay -->
    <div id="analyzing">
      <div class="spinner"></div>
      <span>Analyzing location…</span>
    </div>

    <!-- Capture / Upload buttons -->
    <div id="capture-bar">
      <button id="upload-btn" aria-label="Upload photo" title="Upload photo">🖼️</button>
      <button id="capture-btn" aria-label="Take photo"></button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <!-- Results panel (slides up from bottom) -->
    <div id="results-panel" role="region" aria-live="polite">
      <div class="panel-handle"></div>
      <button id="close-btn" aria-label="Close">✕</button>
      <div id="results-content"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-modal" role="dialog" aria-modal="true" aria-label="Settings">
    <div class="sheet">
      <div class="sheet-title">⚙️ Settings</div>
      <div class="field-label">Anthropic API Key</div>
      <input
        type="password"
        id="api-key-input"
        placeholder="sk-ant-…"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn-save" id="save-key-btn">Save</button>
      <p class="sheet-note">
        Stored locally on this device only.<br>
        Get a key at <strong>console.anthropic.com</strong>
      </p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
